const AI_SYS = `Meta Ads Analyst für "Meilenweit Voraus" (Kurs €297, Webinar sonntags, 40% Käufe Tag 7).
CPL Ziel ≤€12, Freq <3.0, CTR gut >5%. Meta sieht nur ~3% Käufe. Antworte NUR als JSON:

async function runAI(c) {
  const res = await fetch(PROXY+"/api/claude",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:AI_SYS,
      messages:[{role:"user",content:`${c.name}\nSpend:€${c.spend} Leads:${c.leads} CPL:€${f2(c.cpl)} CTR:${c.ctr}% Freq:${c.freq} Budget:€${c.budget}/T`}]})
  });
  const d = await res.json();
  return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
}

  return (
    <div style={{width:"100%"}}>

// ═══════════ KPI STRIP ═══════════════════════════════════════════════════════

function KPIStrip({webinars,meta}) {
  const totRev   = webinars.reduce((a,w)=>a+w.revenue,0);
  const totSpend = webinars.reduce((a,w)=>a+w.spend,0);
  const totSales = webinars.reduce((a,w)=>a+w.sales,0);
  const avgRoas  = totSpend>0?totRev/totSpend:0;
  const metaSpend= meta.reduce((a,c)=>a+c.spend,0);
  const metaLeads= meta.reduce((a,c)=>a+c.leads,0);
  const avgCpl   = metaLeads>0?metaSpend/metaLeads:0;
  const allDay0  = webinars.reduce((a,w)=>a+w.day0,0);
  const allDay7  = webinars.reduce((a,w)=>a+w.day7,0);
  const allS     = webinars.reduce((a,w)=>a+w.sales,0);
  const avgSU    = webinars.filter(w=>w.showUp>0).reduce((a,w,_,arr)=>a+w.showUp/arr.length,0);

  const cards = [
    {l:"TC Revenue",    v:eur(totRev),  s:`${totSales} Käufe`,    c:"#16a34a",a:"#16a34a",t:"CSV"},
    {l:"Ad Spend",      v:eur(totSpend),s:"alle Webinare",         c:null,     a:"#6366f1",t:"CSV"},
    {l:"Ø ROAS",        v:f2(avgRoas)+"x",s:"TC ÷ Spend",         c:rc(avgRoas),a:rc(avgRoas),t:"CSV"},
    {l:"Meta Spend 30T",v:eur(metaSpend),s:"Windsor.ai live",      c:null,     a:"#6366f1",t:"LIVE"},
    {l:"Leads 30T",     v:metaLeads.toLocaleString("de-DE"),s:`CPL Ø €${f2(avgCpl)}`,c:cc(avgCpl),a:cc(avgCpl),t:"LIVE"},
    {l:"Ø Show-Up",     v:Math.round(avgSU)+"%",s:"aller Webinare",c:su(avgSU),a:su(avgSU),t:"CSV"},
    {l:"Delay Tag 0",   v:pct(allDay0,allS)+"%",s:"Sonntag direkt",c:"#6366f1",a:"#6366f1",t:"CSV"},
    {l:"Delay Tag 7",   v:pct(allDay7,allS)+"%",s:"vor nächstem Webinar",c:"#f59e0b",a:"#f59e0b",t:"CSV"},
  ];
  return (
    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:9}}>
      {cards.map(({l,v,s,c,a,t})=>(
        <div key={l} className="card" style={{padding:"16px 18px",borderTop:`3px solid ${a||"#e5e7eb"}`,position:"relative"}}>
          <span style={{position:"absolute",top:7,right:8,background:t==="LIVE"?"#dcfce7":"#e0e7ff",color:t==="LIVE"?"#16a34a":"#6366f1",fontSize:7,fontWeight:700,borderRadius:3,padding:"1px 5px",...P}}>{t}</span>
          <div style={{fontSize:10,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1.5,fontWeight:600,marginBottom:5,...P}}>{l}</div>
          <div style={{fontSize:22,fontWeight:800,color:c||"#111",...P}}>{v}</div>
          <div style={{fontSize:11,color:"#d1d5db",marginTop:3,...P}}>{s}</div>
        </div>
      ))}
    </div>
  );
}

// ═══════════ AUDIENCE TOOL (inline) ══════════════════════════════════════════

async function wgFetch(path) {
  const [pp,qp] = path.split("?");
  const url = PROXY+"/api/webinargeek?path="+encodeURIComponent(pp)+(qp?"&"+qp:"");
  const res = await fetch(url);
  if(!res.ok) throw new Error(`${res.status}`);
  return res.json();
}

async function sha256(s) {
  const buf = await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s.toLowerCase().trim()));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

function downloadCSV(rows,filename) {
  const csv=rows.map(r=>r.map(c=>`"${(c||"").toString().replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=filename; a.click();
}

  const [selBcast,setSelBcast]=useState(null);
  const [subs,setSubs]=useState([]);
  const [loading,setLoading]=useState({wg:false,bc:false,subs:false});
  const [filter,setFilter]=useState("attendees");
  const [minWatch,setMinWatch]=useState(15);
  const [exporting,setExporting]=useState(false);
  const [allSeed,setAllSeed]=useState([]);
  const [loadingAll,setLoadingAll]=useState(false);
  const [progress,setProgress]=useState({done:0,total:0});
  const [error,setError]=useState(null);

  useEffect(()=>{
    setLoading(l=>({...l,wg:true}));
    wgFetch("/webinars?per_page=100")
      .then(d=>setWebinars(Array.isArray(d)?d:(d.webinars||d.data||[])))
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(l=>({...l,wg:false})));
  },[]);

  useEffect(()=>{
    if(!selected) return;
    setLoading(l=>({...l,bc:true}));
    setBroadcasts([]); setSelBcast(null); setSubs([]);
    wgFetch(`/webinars/${selected.id}/broadcasts`)
      .then(d=>{const list=Array.isArray(d)?d:(d.broadcasts||d.data||[]);setBroadcasts(list);if(list.length===1)setSelBcast(list[0]);})
      .catch(e=>setError(e.message))
      .finally(()=>setLoading(l=>({...l,bc:false})));
  },[selected]);

  useEffect(()=>{
    if(!selBcast||!selected) return;
    setLoading(l=>({...l,subs:true})); setSubs([]);
    async function load(){let page=1,all=[];
      while(true){
        const d=await wgFetch(`/webinars/${selected.id}/broadcasts/${selBcast.id}/subscriptions?page=${page}&per_page=100`);
        const items=Array.isArray(d)?d:(d.subscriptions||d.data||[]);
        all=all.concat(items); if(items.length<100)break; page++;
      } setSubs(all);
    }
    load().catch(e=>setError(e.message)).finally(()=>setLoading(l=>({...l,subs:false})));
  },[selBcast,selected]);

  const getW = s=>s.time_watched||s.view_time||s.viewing_time||0;
  const isAtt = s=>getW(s)>0||s.attended===true;

  const filtered = subs.filter(s=>{
    if(filter==="attendees") return isAtt(s);
    if(filter==="highstick") return isAtt(s)&&getW(s)>=minWatch*60;
    if(filter==="noshow") return !isAtt(s);
    return true;
  });

  const stats = {total:subs.length,attended:subs.filter(isAtt).length,
    highstick:subs.filter(s=>isAtt(s)&&getW(s)>=minWatch*60).length,noshow:subs.filter(s=>!isAtt(s)).length};

  async function exportMeta(data,filename){
    setExporting(true);
    const rows=[["email","phone","fn","ln"]];
    for(const s of data){
      const em=s.email||"",ph=(s.phone_number||s.phone||"").replace(/\s/g,"");
      const fn=s.first_name||(s.name||"").split(" ")[0]||"";
      const ln=s.last_name||(s.name||"").split(" ").slice(1).join(" ")||"";
      rows.push([em?await sha256(em):"",ph?await sha256(ph):"",fn?await sha256(fn.toLowerCase()):"",ln?await sha256(ln.toLowerCase()):""]);
    }
    downloadCSV(rows,filename); setExporting(false);
  }

  async function loadAllSeed(){
    setLoadingAll(true); setAllSeed([]);
    setProgress({done:0,total:webinars.length});
    const all=[];
    for(let i=0;i<webinars.length;i++){
      const w=webinars[i];
      try{
        const bcD=await wgFetch(`/webinars/${w.id}/broadcasts`);
        const bcs=Array.isArray(bcD)?bcD:(bcD.broadcasts||bcD.data||[]);
        for(const bc of bcs){
          let page=1;
          while(true){
            const d=await wgFetch(`/webinars/${w.id}/broadcasts/${bc.id}/subscriptions?page=${page}&per_page=100`);
            const items=Array.isArray(d)?d:(d.subscriptions||d.data||[]);
            all.push(...items.filter(isAtt)); if(items.length<100)break; page++;
          }
        }
      }catch{}
      setProgress({done:i+1,total:webinars.length});
    }
    const seen=new Set();
    setAllSeed(all.filter(s=>{if(!s.email||seen.has(s.email))return false;seen.add(s.email);return true;}));
    setLoadingAll(false);
  }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {error&&<div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:10,padding:"10px 14px",color:"#dc2626",fontSize:11}}>{error}</div>}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {/* Webinar select */}
        <div className="card" style={{padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:6,...P}}>
            📋 Webinar wählen {loading.wg&&<Spin s={12}/>}
          </div>
          <select onChange={e=>setSelected(webinars.find(x=>x.id==e.target.value)||null)}
            style={{width:"100%",padding:"7px 10px",border:"1px solid #e5e7eb",borderRadius:7,fontSize:11,color:"#374151",background:"#fff",marginBottom:8,...P}}>
            <option value="">— Webinar wählen ({webinars.length} geladen) —</option>
            {webinars.map(w=><option key={w.id} value={w.id}>{w.title||w.name}</option>)}
          </select>
          {broadcasts.length>1&&(
            <select onChange={e=>setSelBcast(broadcasts.find(x=>x.id==e.target.value)||null)}
              style={{width:"100%",padding:"7px 10px",border:"1px solid #e5e7eb",borderRadius:7,fontSize:11,color:"#374151",background:"#fff",...P}}>
              <option value="">— Session wählen —</option>
              {broadcasts.map(bc=><option key={bc.id} value={bc.id}>{bc.start_time?new Date(bc.start_time*1000).toLocaleDateString("de-DE"):`Session ${bc.id}`}</option>)}
            </select>
          )}
        </div>

        {/* Mega Seed */}
        <div className="card" style={{padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,marginBottom:4,...P}}>🎯 Mega Seed — Alle Webinare</div>
          <div style={{fontSize:10,color:"#6b7280",marginBottom:10,lineHeight:1.5,...P}}>Alle Attendees aus allen {webinars.length} Webinaren, dedupliziert. Größter LLA-Seed.</div>
          {allSeed.length>0?(
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"7px 12px",minWidth:90}}>
                <div style={{fontSize:9,color:"#16a34a",fontWeight:700,...P}}>UNIQUE</div>
                <div style={{fontSize:20,fontWeight:800,color:"#16a34a",...P}}>{allSeed.length.toLocaleString("de-DE")}</div>
              </div>
              <button onClick={()=>exportMeta(allSeed,"meta_ALL_attendees_seed.csv")} disabled={exporting}
                style={{flex:1,background:"#111827",color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700,cursor:"pointer",...P}}>
                {exporting?"Hashe…":"⬇ Meta CSV (SHA-256)"}
              </button>
            </div>
          ):(
            <button onClick={loadAllSeed} disabled={loadingAll||webinars.length===0}
              style={{width:"100%",background:loadingAll?"#f3f4f6":"#6366f1",color:loadingAll?"#9ca3af":"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:11,fontWeight:700,cursor:loadingAll?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,...P}}>
              {loadingAll?<><Spin s={12}/>{progress.done}/{progress.total} Webinare…</>:`✦ Alle ${webinars.length} Webinare laden`}
            </button>
          )}
        </div>
      </div>

      {/* Stats + Filter */}
      {subs.length>0&&(
        <div className="card" style={{padding:"12px 16px",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          {[["Gesamt",stats.total,"#6366f1","#eef2ff","#c7d2fe"],["Erschienen",stats.attended,"#16a34a","#f0fdf4","#bbf7d0"],[`>${minWatch}min`,stats.highstick,"#f59e0b","#fefce8","#fde68a"],["No-Show",stats.noshow,"#9ca3af","#f9fafb","#e5e7eb"]].map(([l,v,c,bg,bd])=>(
            <div key={l} style={{background:bg,border:`1px solid ${bd}`,borderRadius:7,padding:"6px 10px",minWidth:70}}>
              <div style={{fontSize:8,color:c,fontWeight:700,textTransform:"uppercase",...P}}>{l}</div>
              <div style={{fontSize:18,fontWeight:800,color:c,...P}}>{v}</div>
              <div style={{fontSize:8,color:"#9ca3af",...P}}>{pct(v,stats.total)}%</div>
            </div>
          ))}
          <div style={{flex:1}}/>
          <div style={{display:"flex",gap:3,background:"#f3f4f6",border:"1px solid #e5e7eb",borderRadius:7,padding:3}}>
            {[["all","Alle"],["attendees","Erschienen"],["highstick",`>${minWatch}min`],["noshow","No-Show"]].map(([k,l])=>(
              <button key={k} onClick={()=>setFilter(k)}
                style={{background:filter===k?"#fff":"transparent",color:filter===k?"#111":"#9ca3af",border:filter===k?"1px solid #e5e7eb":"1px solid transparent",borderRadius:5,padding:"4px 10px",fontSize:10,fontWeight:600,cursor:"pointer",...P}}>
                {l}
              </button>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:9,color:"#9ca3af",...P}}>Min.Watch</span>
            <input type="number" value={minWatch} min={1} max={120} onChange={e=>setMinWatch(Number(e.target.value))}
              style={{width:46,border:"1px solid #e5e7eb",borderRadius:5,padding:"3px 6px",fontSize:10,textAlign:"center",...P}}/>
            <span style={{fontSize:9,color:"#9ca3af",...P}}>min</span>
          </div>
          <div style={{display:"flex",gap:7}}>
            <button onClick={()=>{const rows=[["Email","Vorname","Nachname","Telefon","Watch(min)","Erschienen"]];for(const s of filtered)rows.push([s.email||"",s.first_name||"",s.last_name||"",s.phone_number||"",Math.round(getW(s)/60),isAtt(s)?"Ja":"Nein"]);downloadCSV(rows,`wg_${filter}.csv`);}}
              style={{background:"#f3f4f6",border:"1px solid #e5e7eb",borderRadius:6,padding:"5px 11px",fontSize:10,fontWeight:700,cursor:"pointer",...P}}>⬇ Raw CSV</button>
            <button onClick={()=>exportMeta(filtered,`meta_${filter}.csv`)} disabled={exporting||!filtered.length}
              style={{background:exporting?"#f3f4f6":"#111827",color:exporting?"#9ca3af":"#fff",border:"none",borderRadius:6,padding:"5px 11px",fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:4,...P}}>
              {exporting?<><Spin s={11}/>Hashe…</>:"⬇ Meta Audience (SHA-256)"}
            </button>
          </div>
        </div>
      )}

      {/* Subs Table */}
      {subs.length>0&&(
        <div className="card" style={{overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 130px 100px 80px 65px",padding:"7px 16px",background:"#f9fafb",borderBottom:"1px solid #f3f4f6"}}>
            {["Email","Name","Watch Time","Telefon","Status"].map(h=>(
              <div key={h} style={{fontSize:8,color:"#9ca3af",fontWeight:600,textTransform:"uppercase",letterSpacing:.8,...P}}>{h}</div>
            ))}
          </div>
          {loading.subs&&<div style={{padding:"20px",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}><Spin/><span style={{fontSize:11,color:"#9ca3af",...P}}>Lade…</span></div>}
          <div style={{maxHeight:320,overflowY:"auto"}}>
            {filtered.slice(0,200).map((s,i)=>{
              const watched=Math.round(getW(s)/60); const att=isAtt(s);
              const name=[s.first_name,s.last_name].filter(Boolean).join(" ")||s.name||"—";
              return (
                <div key={s.id||i} className="hov" style={{display:"grid",gridTemplateColumns:"1fr 130px 100px 80px 65px",padding:"8px 16px",borderBottom:"1px solid #f3f4f6",alignItems:"center"}}>
                  <div style={{fontSize:10,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",...P}}>{s.email||"—"}</div>
                  <div style={{fontSize:10,color:"#6b7280",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",...P}}>{name}</div>
                  <div>{watched>0?(<div><div style={{fontSize:10,fontWeight:700,color:watched>=minWatch?"#16a34a":"#ca8a04",...P}}>{watched} min</div><div style={{background:"#f3f4f6",borderRadius:2,height:3,marginTop:2,width:70,overflow:"hidden"}}><div style={{width:`${Math.min(watched/90*100,100)}%`,height:"100%",background:watched>=minWatch?"#16a34a":"#ca8a04"}}/></div></div>):<span style={{fontSize:9,color:"#d1d5db",...P}}>—</span>}</div>
                  <div style={{fontSize:10,color:"#9ca3af",...P}}>{s.phone_number||s.phone||"—"}</div>
                  <div>{att?<Tag label="ATTENDED" color="#16a34a" bg="#f0fdf4" border="#bbf7d0"/>:<Tag label="NO-SHOW" color="#9ca3af" bg="#f9fafb" border="#e5e7eb"/>}</div>
                </div>
              );
            })}
            {filtered.length>200&&<div style={{padding:"10px",textAlign:"center",fontSize:10,color:"#9ca3af",...P}}>+ {filtered.length-200} weitere im Export</div>}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
