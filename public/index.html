<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meilenweit Voraus — Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#f4f5f7;color:#1a1a2e;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Header */
.header{background:#fff;border-bottom:1px solid #eaecf0;padding:0 40px;position:sticky;top:0;z-index:100}
.header-inner{max-width:1300px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:700;color:#111}
.nav{display:flex;gap:4px;background:#f4f5f7;padding:3px;border-radius:8px}
.nav button{border:none;background:transparent;border-radius:5px;padding:6px 16px;font-size:13px;font-weight:500;font-family:'Inter',sans-serif;cursor:pointer;color:#6b7280;transition:all .15s}
.nav button.active{background:#fff;color:#111;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* Page */
.page{max-width:1300px;margin:0 auto;padding:32px 40px 80px}
.page-title{font-size:24px;font-weight:700;color:#111;margin-bottom:4px}
.page-sub{font-size:14px;color:#9ca3af;margin-bottom:28px}

/* Top stats - exactly like ThriveCart */
.top-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid #eaecf0;border-radius:12px;padding:24px 28px}
.stat-label{font-size:13px;color:#6b7280;font-weight:500;margin-bottom:10px}
.stat-value{font-size:32px;font-weight:700;color:#111;letter-spacing:-1px;line-height:1}
.stat-sub{font-size:12px;color:#9ca3af;margin-top:6px}
.stat-badge{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:8px}
.up{background:#ecfdf5;color:#059669}.down{background:#fef2f2;color:#dc2626}.neutral{background:#f3f4f6;color:#6b7280}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;margin-top:32px}
.section-title{font-size:15px;font-weight:600;color:#111}
.section-right{display:flex;align-items:center;gap:12px}
.section-meta{font-size:12px;color:#9ca3af}

/* Table */
.table-wrap{background:#fff;border:1px solid #eaecf0;border-radius:12px;overflow:hidden}
.table-head{display:grid;padding:12px 24px;background:#f9fafb;border-bottom:1px solid #eaecf0}
.th{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:.8px}
.t-row{display:grid;padding:16px 24px;border-bottom:1px solid #f3f4f6;cursor:pointer;transition:background .1s;align-items:center}
.t-row:last-child{border-bottom:none}
.t-row:hover,.t-row.exp{background:#f9fafb}
.td{font-size:14px;color:#374151}
.td-main{font-size:15px;font-weight:600;color:#111}
.td-big{font-size:20px;font-weight:700;color:#111;letter-spacing:-0.5px}

/* Expanded */
.expand-row{background:#f9fafb;border-bottom:1px solid #eaecf0;padding:20px 24px;animation:fadeIn .15s ease}
.expand-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.expand-card{background:#fff;border:1px solid #eaecf0;border-radius:8px;padding:14px 16px}
.expand-label{font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.expand-value{font-size:18px;font-weight:700;color:#111}
.expand-sub{font-size:11px;color:#9ca3af;margin-top:3px}

/* Badges */
.badge{display:inline-block;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;letter-spacing:.2px}
.b-green{background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.b-yellow{background:#fffbeb;color:#d97706;border:1px solid #fde68a}
.b-red{background:#fef2f2;color:#dc2626;border:1px solid #fecaca}
.b-purple{background:#f5f3ff;color:#7c3aed;border:1px solid #ddd6fe}
.b-blue{background:#eff6ff;color:#2563eb;border:1px solid #bfdbfe}

/* Product dots */
.prod-dots{display:flex;gap:5px;align-items:center}
.prod-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Button */
.btn{border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;background:#111;color:#fff}
.btn:hover{background:#333}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-outline{background:#fff;color:#374151;border:1px solid #e5e7eb}
.btn-outline:hover{background:#f9fafb}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}

/* Colors */
.green{color:#059669}.yellow{color:#d97706}.red{color:#dc2626}.purple{color:#7c3aed}.orange{color:#ea580c}.blue{color:#2563eb}.gray{color:#9ca3af}

/* AI detail */
.ai-detail{background:#f9fafb;border-bottom:1px solid #eaecf0;padding:20px 24px;animation:fadeIn .15s ease}
.ai-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1.3fr;gap:20px}
.ai-label{font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.ai-val{font-size:13px;color:#374151;line-height:1.5}
.ai-divider{border-left:1px solid #eaecf0;padding-left:20px}

/* Chart */
.chart-wrap{background:#fff;border:1px solid #eaecf0;border-radius:12px;padding:24px;margin-bottom:0}
.chart-canvas{width:100%;height:180px;position:relative;margin-top:12px}
.chart-bar-group{display:flex;align-items:flex-end;gap:2px;height:150px}
.chart-bar{border-radius:4px 4px 0 0;transition:opacity .15s;cursor:pointer;flex:1;min-width:12px}
.chart-bar:hover{opacity:.75}
.chart-labels{display:flex;gap:2px;margin-top:6px}
.chart-label{flex:1;font-size:10px;color:#9ca3af;text-align:center;overflow:hidden;min-width:12px}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">Meilenweit Voraus</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="nav">
        <button class="active" id="btn-last4" onclick="setView('last4')">Letzte 4 Webinare</button>
        <button id="btn-all" onclick="setView('all')">Alle 2026</button>
      </div>
    </div>
  </div>
</div>

<div class="page">
  <div class="page-title">Dashboard</div>
  <div class="page-sub" id="page-sub">Letzte 4 Webinare · ThriveCart Attribution · Sonntag 10:00 Stichtag</div>

  <!-- Top Stats -->
  <div class="top-stats" id="top-stats"></div>

  <!-- ROAS Chart -->
  <div class="section-header">
    <span class="section-title">ROAS-Verlauf</span>
    <span class="section-meta">TC Revenue ÷ Ad Spend</span>
  </div>
  <div class="chart-wrap">
    <div class="chart-canvas">
      <div class="chart-bar-group" id="chart-bars"></div>
      <div class="chart-labels" id="chart-labels"></div>
    </div>
  </div>

  <!-- Webinar Table -->
  <div class="section-header">
    <span class="section-title">Webinar-Performance</span>
    <span class="section-meta">Klick für Details</span>
  </div>
  <div class="table-wrap">
    <div class="table-head" id="w-head"></div>
    <div id="w-body"></div>
  </div>

  <!-- Meta Table -->
  <div class="section-header">
    <span class="section-title">Meta Kampagnen</span>
    <div class="section-right">
      <span class="section-meta" id="meta-meta"></span>
      <button class="btn" id="ai-btn" onclick="analyzeAll()">✦ KI-Analyse</button>
    </div>
  </div>
  <div class="table-wrap">
    <div class="table-head" style="grid-template-columns:2fr 90px 70px 80px 65px 65px 110px">
      <span class="th">Kampagne</span>
      <span class="th">Spend</span>
      <span class="th">Leads</span>
      <span class="th">CPL</span>
      <span class="th">CTR</span>
      <span class="th">Freq</span>
      <span class="th">KI-Bewertung</span>
    </div>
    <div id="m-body"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════
// DATA
// ══════════════════════════════════════════════════
const WEBINARS = [
  {d:"2026-05-03",l:"03.05.",spend:3078, leads:551, su:17, rev:1282,  roas:0.42,s:7,  d0:6, d7:0, partial:1,kurs:1188,mc:0,    rev2:94,  geo:0  },
  {d:"2026-04-26",l:"26.04.",spend:0,    leads:0,   su:0,  rev:11351, roas:0,   s:45, d0:8, d7:20,partial:0,kurs:5050,mc:5467, rev2:814, geo:0  },
  {d:"2026-04-19",l:"19.04.",spend:7243, leads:598, su:20, rev:16320, roas:2.25,s:50, d0:6, d7:7, partial:0,kurs:2376,mc:13419,rev2:485, geo:0  },
  {d:"2026-04-12",l:"12.04.",spend:9932, leads:1259,su:21, rev:3649,  roas:0.37,s:24, d0:3, d7:13,partial:0,kurs:3267,mc:0,    rev2:282, geo:0  },
  {d:"2026-04-05",l:"05.04.",spend:2431, leads:281, su:22, rev:7335,  roas:3.02,s:45, d0:6, d7:34,partial:0,kurs:6237,mc:0,    rev2:908, geo:0  },
  {d:"2026-03-29",l:"29.03.",spend:6569, leads:470, su:24, rev:3267,  roas:0.50,s:19, d0:2, d7:9, partial:0,kurs:3073,mc:0,    rev2:94,  geo:0  },
  {d:"2026-03-22",l:"22.03.",spend:10852,leads:950, su:28, rev:12282, roas:1.13,s:60, d0:24,d7:17,partial:0,kurs:7826,mc:3976, rev2:0,   geo:0  },
  {d:"2026-03-15",l:"15.03.",spend:6654, leads:523, su:28, rev:10218, roas:1.54,s:49, d0:16,d7:20,partial:0,kurs:10098,mc:0,   rev2:0,   geo:0  },
  {d:"2026-03-08",l:"08.03.",spend:9432, leads:782, su:24, rev:10559, roas:1.12,s:54, d0:18,d7:13,partial:0,kurs:10202,mc:0,   rev2:297, geo:0  },
  {d:"2026-03-01",l:"01.03.",spend:21098,leads:1863,su:25, rev:15281, roas:0.72,s:89, d0:45,d7:18,partial:0,kurs:14553,mc:0,   rev2:594, geo:94 },
  {d:"2026-02-22",l:"22.02.",spend:12978,leads:1400,su:32, rev:17089, roas:1.32,s:85, d0:37,d7:29,partial:0,kurs:16335,mc:0,   rev2:0,   geo:94 },
  {d:"2026-02-15",l:"15.02.",spend:8878, leads:964, su:33, rev:23563, roas:2.65,s:112,d0:37,d7:55,partial:0,kurs:22081,mc:0,   rev2:297, geo:705},
  {d:"2026-02-08",l:"08.02.",spend:5390, leads:720, su:25, rev:11106, roas:2.06,s:62, d0:18,d7:34,partial:0,kurs:10098,mc:0,   rev2:297, geo:611},
  {d:"2026-02-01",l:"01.02.",spend:8325, leads:1041,su:14, rev:12330, roas:1.48,s:75, d0:25,d7:21,partial:0,kurs:11339,mc:0,   rev2:0,   geo:564},
  {d:"2026-01-25",l:"25.01.",spend:6819, leads:792, su:36, rev:10183, roas:1.49,s:81, d0:25,d7:40,partial:0,kurs:8613, mc:0,   rev2:0,   geo:893},
  {d:"2026-01-18",l:"18.01.",spend:3384, leads:389, su:28, rev:10587, roas:3.13,s:47, d0:5, d7:32,partial:0,kurs:9110, mc:0,   rev2:0,   geo:376},
];

const META=[
  {n:"ML 30.03. Testing ABO DACH",        sp:6919,le:674,cpl:10.27,fr:1.53,ctr:4.72,bud:230},
  {n:"ML 23.04. Webinar-Funnel LLA 1%",   sp:4693,le:642,cpl:7.31, fr:1.82,ctr:7.48,bud:156},
  {n:"ML 06.04. Broad Cost Cap CBO",      sp:2504,le:259,cpl:9.67, fr:1.29,ctr:4.13,bud:83 },
  {n:"ML 27.04. Webinar-Funnel LLA 3%",   sp:1405,le:201,cpl:6.99, fr:1.41,ctr:7.14,bud:47 },
  {n:"ML 07.04. LLA 1% Purchase CBO",     sp:1994,le:216,cpl:9.23, fr:1.46,ctr:6.05,bud:66 },
  {n:"ML 07.04. LLA 3% Purchase CBO",     sp:1964,le:222,cpl:8.85, fr:1.30,ctr:5.83,bud:65 },
  {n:"ML 15.04. VSL-Funnel LLA 1%",       sp:1060,le:230,cpl:4.61, fr:1.46,ctr:8.43,bud:35 },
  {n:"ML 07.04. CBO Interest Scale",      sp:580, le:56, cpl:10.36,fr:1.16,ctr:4.26,bud:19 },
  {n:"ML 06.04. CBO Scale",               sp:543, le:61, cpl:8.90, fr:1.16,ctr:7.48,bud:18 },
  {n:"ML 04.05. Community LLA 1%",        sp:317, le:36, cpl:8.81, fr:1.15,ctr:7.18,bud:11 },
];

// ══════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════
const eur  = n=>"€"+Math.round(n||0).toLocaleString("de-DE");
const f2   = n=>(n||0).toFixed(2);
const pct  = (a,b)=>b>0?Math.round(a/b*100):0;
const rc   = r=>r>=1.5?"green":r>=1.0?"yellow":"red";
const bc   = r=>r>=1.5?"b-green":r>=1.0?"b-yellow":"b-red";
const suC  = s=>s>=28?"green":s>=22?"yellow":"red";
const cplC = c=>!c?"gray":c<=10?"green":c<=13?"yellow":"red";

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let view="last4", expandW=null, expandM=null, aiRes={}, aiRunning=false;

function ws(){return view==="last4"?WEBINARS.slice(0,4):WEBINARS}

// ══════════════════════════════════════════════════
// TOP STATS
// ══════════════════════════════════════════════════
function renderStats(){
  const w=ws();
  const rev  =w.reduce((a,x)=>a+x.rev,0);
  const spend=w.reduce((a,x)=>a+x.spend,0);
  const sales=w.reduce((a,x)=>a+x.s,0);
  const roas =spend>0?rev/spend:0;
  const su   =w.filter(x=>x.su>0).reduce((a,x,_,arr)=>a+x.su/arr.length,0);
  const d0   =w.reduce((a,x)=>a+x.d0,0);
  const d7   =w.reduce((a,x)=>a+x.d7,0);
  const ml30 =META.reduce((a,c)=>a+c.sp,0);
  const leads=META.reduce((a,c)=>a+c.le,0);
  const cpl  =leads>0?ml30/leads:0;

  document.getElementById("top-stats").innerHTML=[
    {label:"Gesamt-Revenue",  value:eur(rev),            sub:`${sales} Käufe`,               badge:roas>=1.5?"up":roas>=1?"neutral":"down", badgeText:f2(roas)+"x ROAS"},
    {label:"Ad Spend",        value:eur(spend),           sub:`${w.length} Webinare`,          badge:"neutral",badgeText:`${w.filter(x=>x.spend>0).length} mit Spend`},
    {label:"Ø Show-Up",       value:Math.round(su)+"%",   sub:"Registrierungen → Anwesend",    badge:su>=28?"up":su>=22?"neutral":"down",badgeText:su>=28?"Gut":"Optimierbar"},
    {label:"Delay: Tag 7",    value:pct(d7,sales)+"%",    sub:"kaufen erst vor nächstem Webinar",badge:"neutral",badgeText:`Tag 0: ${pct(d0,sales)}%`},
  ].map(c=>`
    <div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-sub">${c.sub}</div>
      <div class="stat-badge ${c.badge}">${c.badgeText}</div>
    </div>`).join("");
}

// ══════════════════════════════════════════════════
// CHART
// ══════════════════════════════════════════════════
function renderChart(){
  const w=ws();
  const maxR=Math.max(...w.map(x=>x.roas),2);
  const bars=w.slice().reverse().map(x=>{
    const h=x.roas>0?Math.min(x.roas/maxR*100,100):2;
    const col=x.roas>=1.5?"#059669":x.roas>=1?"#d97706":"#dc2626";
    const bg =x.roas>=1.5?"#ecfdf5":x.roas>=1?"#fffbeb":"#fef2f2";
    return `<div class="chart-bar" style="height:${h}%;background:${col};opacity:.7" title="${x.l}: ${f2(x.roas)}x ROAS — ${eur(x.rev)}"></div>`;
  }).join("");
  const labels=w.slice().reverse().map(x=>`<div class="chart-label">${x.l}</div>`).join("");
  document.getElementById("chart-bars").innerHTML=bars;
  document.getElementById("chart-labels").innerHTML=labels;

  // Reference line at 1.5x
  const target=document.querySelector(".chart-canvas");
  if(target&&!target.querySelector(".ref-line")){
    const line=document.createElement("div");
    line.className="ref-line";
    const pos=Math.min(1.5/maxR*100,100);
    line.style.cssText=`position:absolute;left:0;right:0;bottom:${pos}%;border-top:1px dashed #059669;opacity:.4;pointer-events:none`;
    target.appendChild(line);
  }
}

// ══════════════════════════════════════════════════
// WEBINAR TABLE
// ══════════════════════════════════════════════════
function renderWebinars(){
  const COLS="100px 80px 120px 75px 80px 70px 65px 75px 100px";
  document.getElementById("w-head").style.gridTemplateColumns=COLS;
  document.getElementById("w-head").innerHTML=
    ["Datum","Show%","Revenue","Käufe","ROAS","Tag 0","Tag 7","Leads","Spend"]
    .map(h=>`<span class="th">${h}</span>`).join("");

  const PRODS=[
    {k:"kurs", color:"#7c3aed",label:"Meilenkurs"},
    {k:"mc",   color:"#d97706",label:"Masterclass"},
    {k:"rev2", color:"#059669",label:"Revolut/KB"},
    {k:"geo",  color:"#2563eb",label:"George"},
  ];

  let html="";
  ws().forEach(w=>{
    const isExp=expandW===w.d;
    const dots=PRODS.filter(p=>w[p.k]>0).map(p=>
      `<div class="prod-dot" style="background:${p.color}" title="${p.label}: ${eur(w[p.k])}"></div>`
    ).join("");

    html+=`
    <div class="t-row${isExp?" exp":""}" style="grid-template-columns:${COLS}" onclick="toggleW('${w.d}')">
      <div>
        <div class="td-main">${w.l}</div>
        ${w.partial?'<div style="font-size:11px;color:#9ca3af;margin-top:1px">laufend</div>':''}
        ${!w.spend&&!w.partial?'<div style="font-size:11px;color:#d97706;margin-top:1px">carry-over</div>':''}
      </div>
      <div class="${suC(w.su)}" style="font-size:15px;font-weight:600">${w.su>0?w.su+"%":"—"}</div>
      <div class="td-big">${eur(w.rev)}</div>
      <div style="font-size:18px;font-weight:700;color:#111">${w.s}</div>
      <div>${w.roas>0?`<span class="badge ${bc(w.roas)}">${f2(w.roas)}x</span>`:'<span class="gray">—</span>'}</div>
      <div class="purple" style="font-weight:600">${pct(w.d0,w.s)}%</div>
      <div class="orange" style="font-weight:600">${pct(w.d7,w.s)}%</div>
      <div class="td gray">${w.leads||"—"}</div>
      <div class="td gray">${w.spend>0?eur(w.spend):"—"}</div>
    </div>`;

    if(isExp){
      const cards=[
        ...PRODS.map(p=>({label:p.label,value:w[p.k]>0?eur(w[p.k]):"—",sub:w[p.k]>0?pct(w[p.k],w.rev)+"%":"",color:w[p.k]>0?p.color:"#d1d5db"})),
        {label:"CPL",value:w.leads>0?"€"+f2(w.spend/w.leads):"—",sub:"",color:w.leads>0?({green:"#059669",yellow:"#d97706",red:"#dc2626",gray:"#9ca3af"}[cplC(w.leads>0?w.spend/w.leads:0)]):"#d1d5db"},
        {label:"Ø Order",value:w.s>0?eur(w.rev/w.s):"—",sub:"",color:"#111"},
        {label:"Delay Split",value:`<span style="color:#7c3aed">Tag 0: ${w.d0}</span>`,sub:`<span style="color:#ea580c">Tag 7: ${w.d7}</span>`,color:"#111",html:1},
      ];
      html+=`<div class="expand-row">
        <div class="expand-grid">
          ${cards.map(c=>`<div class="expand-card">
            <div class="expand-label">${c.label}</div>
            <div class="expand-value" style="color:${c.color}">${c.value}</div>
            ${c.sub?`<div class="expand-sub">${c.sub}</div>`:""}
          </div>`).join("")}
        </div>
      </div>`;
    }
  });
  document.getElementById("w-body").innerHTML=html;
}

// ══════════════════════════════════════════════════
// META TABLE
// ══════════════════════════════════════════════════
function renderMeta(){
  const tsp=META.reduce((a,c)=>a+c.sp,0);
  const tle=META.reduce((a,c)=>a+c.le,0);
  document.getElementById("meta-meta").textContent=`Windsor.ai · ${eur(tsp)} · ${tle} Leads`;

  const VCFG={
    scale:{label:"SCALE +20%", cls:"b-green"},
    hold: {label:"HOLD",       cls:"b-yellow"},
    test: {label:"TESTEN",     cls:"b-blue"},
    pause:{label:"PAUSE",      cls:"b-red"},
  };
  const COLS="2fr 90px 70px 80px 65px 65px 110px";
  let html="";
  META.forEach(c=>{
    const res=aiRes[c.n];
    const isExp=expandM===c.n;
    let kiBadge='<span style="font-size:12px;color:#d1d5db">→ analysieren</span>';
    if(res){const vc=VCFG[res.verdict]||VCFG.hold;kiBadge=`<span class="badge ${vc.cls}">${vc.label}</span>`;}

    html+=`
    <div class="t-row${isExp?" exp":""}" style="grid-template-columns:${COLS}" onclick="clickM(this,'${c.n.replace(/'/g,"\\'")}')">
      <div style="font-size:13px;font-weight:500;color:#374151;padding-right:16px;line-height:1.4">${c.n}</div>
      <div class="td">${eur(c.sp)}</div>
      <div style="font-weight:600;font-size:15px">${c.le||"—"}</div>
      <div class="${cplC(c.cpl)}" style="font-weight:600;font-size:15px">${c.cpl>0?"€"+f2(c.cpl):"—"}</div>
      <div class="${c.ctr>=5?"green":"yellow"}">${c.ctr.toFixed(1)}%</div>
      <div class="${c.fr>=2?"red":c.fr>=1.5?"yellow":"gray"}">${c.fr.toFixed(2)}</div>
      <div>${kiBadge}</div>
    </div>`;

    if(res&&isExp){
      const SC={high:"#059669",medium:"#d97706",low:"#dc2626"};
      const AC={deep:"#059669",medium:"#d97706",saturating:"#dc2626"};
      const budLine=res.budget_recommended&&res.budget_recommended!==c.bud
        ?`<div style="display:flex;align-items:center;gap:8px;margin-top:8px">
            <span style="font-size:12px;color:#9ca3af;text-decoration:line-through">€${c.bud}/T</span>
            <span style="font-size:15px;font-weight:700;color:${res.verdict==="scale"?"#059669":"#dc2626"}">→ €${res.budget_recommended}/T</span>
          </div>`:""
      html+=`<div class="ai-detail"><div class="ai-grid">
        <div><div class="ai-label">Signal: <span style="color:${SC[res.signal]||"#666"};font-weight:700">${res.signal}</span></div><div class="ai-val">${res.signal_reason}</div></div>
        <div><div class="ai-label">Trust: <span style="color:${SC[res.trust]||"#666"};font-weight:700">${res.trust}</span></div><div class="ai-val">${res.trust_reason}</div></div>
        <div><div class="ai-label">Audience: <span style="color:${AC[res.audience]||"#666"};font-weight:700">${res.audience}</span></div><div class="ai-val">${res.audience_reason}</div></div>
        <div class="ai-divider"><div class="ai-label">Aktion</div><div class="ai-val" style="font-weight:500">${res.action}</div>${budLine}</div>
      </div></div>`;
    }
  });
  document.getElementById("m-body").innerHTML=html;
}

// ══════════════════════════════════════════════════
// EVENTS
// ══════════════════════════════════════════════════
function toggleW(d){expandW=expandW===d?null:d;renderWebinars();}
function clickM(el,name){
  if(!aiRes[name]&&!aiRunning){analyzeOne(name);}
  else{expandM=expandM===name?null:name;renderMeta();}
}
function setView(v){
  view=v;expandW=null;
  document.getElementById("btn-last4").classList.toggle("active",v==="last4");
  document.getElementById("btn-all").classList.toggle("active",v==="all");
  document.getElementById("page-sub").textContent=v==="last4"
    ?"Letzte 4 Webinare · ThriveCart Attribution · Sonntag 10:00 Stichtag"
    :"Alle Webinare 2026 · ThriveCart Attribution · Sonntag 10:00 Stichtag";
  renderStats();renderChart();renderWebinars();
}

// ══════════════════════════════════════════════════
// AI
// ══════════════════════════════════════════════════
const SYS=`Meta Ads Analyst für "Meilenweit Voraus" (Kurs €297, Webinar sonntags, 40% Käufe Tag 7). CPL Ziel ≤€12, Freq <3.0. Antworte NUR als JSON: {"signal":"high"|"medium"|"low","signal_reason":"max 7W","trust":"high"|"medium"|"low","trust_reason":"max 7W","audience":"deep"|"medium"|"saturating","audience_reason":"max 7W","verdict":"scale"|"hold"|"test"|"pause","action":"max 10W","budget_recommended":number}`;

async function analyzeOne(name){
  const c=META.find(m=>m.n===name);if(!c)return;
  try{
    const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:SYS,
        messages:[{role:"user",content:`${c.n}\nSpend:€${c.sp} Leads:${c.le} CPL:€${f2(c.cpl)} CTR:${c.ctr}% Freq:${c.fr} Budget:€${c.bud}/T`}]})});
    const d=await r.json();
    aiRes[name]=JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
    expandM=name;
  }catch(e){console.error(e);}
  renderMeta();
}

async function analyzeAll(){
  if(aiRunning)return;
  aiRunning=true;
  const btn=document.getElementById("ai-btn");
  btn.innerHTML='<div class="spin"></div> Analysiere…';btn.disabled=true;
  for(const c of META){await analyzeOne(c.n);await new Promise(r=>setTimeout(r,250));}
  aiRunning=false;btn.innerHTML="✦ KI-Analyse";btn.disabled=false;
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
renderStats();renderChart();renderWebinars();renderMeta();
</script>
