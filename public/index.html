<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meilenweit Voraus — Performance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#f4f5f7;color:#111;min-height:100vh;font-size:13px}

.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 32px;position:sticky;top:0;z-index:200}
.header-inner{height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700}
.nav-pills{display:flex;gap:2px;background:#f3f4f6;padding:3px;border-radius:7px}
.nav-pills button{border:none;background:transparent;border-radius:5px;padding:5px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;color:#6b7280;transition:all .1s}
.nav-pills button.active{background:#fff;color:#111;box-shadow:0 1px 3px rgba(0,0,0,.08)}

.wrap{max-width:1600px;margin:0 auto;padding:24px 32px 80px}

/* ── TRENDS ── */
.trends-section{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:24px 28px;margin-bottom:24px}
.trends-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.trends-title{font-size:16px;font-weight:700}
.metric-pills{display:flex;gap:8px;flex-wrap:wrap}
.metric-pill{border:none;border-radius:20px;padding:5px 14px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s;opacity:.45}
.metric-pill.on{opacity:1}
.trends-stats{display:flex;gap:1px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:20px}
.ts-card{flex:1;background:#fff;padding:14px 18px}
.ts-label{font-size:11px;color:#9ca3af;font-weight:500;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px}
.ts-value{font-size:22px;font-weight:700;letter-spacing:-.5px}
.ts-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.chart-area{position:relative;height:200px;margin-top:4px}
svg.chart{width:100%;height:100%}

/* ── SCORECARD ── */
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sc-title{font-size:15px;font-weight:700}
.sc-meta{font-size:12px;color:#9ca3af}
.table-wrap{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{border-collapse:collapse;white-space:nowrap}
thead tr.gr th{
  padding:7px 10px;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;
  border-bottom:1px solid #e5e7eb;text-align:center;
}
.g0{background:#f9fafb;color:#6b7280}
.g1{background:#dbeafe;color:#1e40af}
.g2{background:#ede9fe;color:#5b21b6}
.g3{background:#d1fae5;color:#065f46}
.g4{background:#fef3c7;color:#92400e}
.g5{background:#fce7f3;color:#9d174d}
.g6{background:#f3f4f6;color:#374151}
.g7{background:#ffedd5;color:#9a3412}

thead tr.cr th{
  padding:9px 10px;font-size:10px;font-weight:600;color:#9ca3af;text-transform:uppercase;
  letter-spacing:.5px;background:#f9fafb;border-bottom:2px solid #e5e7eb;
  text-align:right;line-height:1.4;white-space:pre-line;
}
thead tr.cr th:nth-child(1),thead tr.cr th:nth-child(2){text-align:left}

/* Sticky cols */
thead tr.gr th:nth-child(1),thead tr.cr th:nth-child(1),tbody td:nth-child(1){
  position:sticky;left:0;z-index:10;background:inherit;min-width:44px;
  border-right:1px solid #f3f4f6;
}
thead tr.gr th:nth-child(2),thead tr.cr th:nth-child(2),tbody td:nth-child(2){
  position:sticky;left:44px;z-index:10;background:inherit;min-width:72px;
  border-right:2px solid #e5e7eb;
}
thead tr.gr th:nth-child(1),thead tr.gr th:nth-child(2),
thead tr.cr th:nth-child(1),thead tr.cr th:nth-child(2){background:#f9fafb}

tbody tr{border-bottom:1px solid #f3f4f6;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#f9fafb!important}
tbody tr:hover td{background:#f9fafb!important}
tbody td{padding:12px 10px;text-align:right;vertical-align:middle;color:#374151}
tbody td:nth-child(1){background:#fff;color:#6b7280;font-weight:500;font-size:12px;text-align:left}
tbody td:nth-child(2){background:#fff;font-weight:600;font-size:13px;color:#111;text-align:left}

tr.totals td{background:#f9fafb!important;font-weight:700;color:#111!important;border-top:2px solid #e5e7eb}

/* Value styles */
.vg{color:#059669;font-weight:600}.vy{color:#d97706;font-weight:600}.vr{color:#dc2626;font-weight:600}
.vp{color:#7c3aed;font-weight:600}.vb{color:#2563eb;font-weight:500}.vgr{color:#9ca3af}
.vbold{font-weight:700;color:#111}
.editable{color:#2563eb;cursor:pointer;font-size:12px}
.badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:600}
.bg{background:#ecfdf5;color:#059669}.by{background:#fffbeb;color:#d97706}.br{background:#fef2f2;color:#dc2626}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">Meilenweit Voraus — Performance</div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="nav-pills">
        <button class="active" id="b4" onclick="setView('last4')">Letzte 4</button>
        <button id="ba" onclick="setView('all')">Alle 2026</button>
      </div>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- ── TRENDS CHART ── -->
  <div class="trends-section">
    <div class="trends-header">
      <div class="trends-title">Trends</div>
      <div class="metric-pills" id="metric-pills"></div>
    </div>
    <div class="trends-stats" id="trends-stats"></div>
    <div class="chart-area">
      <svg class="chart" id="chart-svg" viewBox="0 0 1000 200" preserveAspectRatio="none"></svg>
    </div>
    <div id="chart-xlabels" style="display:flex;margin-top:8px"></div>
  </div>

  <!-- ── SCORECARD ── -->
  <div class="sc-header">
    <span class="sc-title">Webinar Scorecard</span>
    <span class="sc-meta">Scrollen → · Blaue Felder = befüllbar · Sonntag 10:00 Attribution</span>
  </div>
  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr class="gr" id="gr"></tr>
          <tr class="cr" id="cr"></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
// ══ DATA ══════════════════════════════════════════════════════════════════
const WEB = [
  {d:"2026-05-03",spend:3078, leads:551, su:17, rev:1282,  sales:7,  kurs_r:0,   p:1},
  {d:"2026-04-26",spend:0,    leads:0,   su:0,  rev:11351, sales:45, kurs_r:0,   p:0},
  {d:"2026-04-19",spend:7243, leads:598, su:20, rev:16320, sales:50, kurs_r:0,   p:0},
  {d:"2026-04-12",spend:9932, leads:1259,su:21, rev:3649,  sales:24, kurs_r:90,  p:0},
  {d:"2026-04-05",spend:2431, leads:281, su:22, rev:7335,  sales:45, kurs_r:180, p:0},
  {d:"2026-03-29",spend:6569, leads:470, su:24, rev:3267,  sales:19, kurs_r:90,  p:0},
  {d:"2026-03-22",spend:10852,leads:950, su:28, rev:12282, sales:60, kurs_r:450, p:0},
  {d:"2026-03-15",spend:6654, leads:523, su:28, rev:10218, sales:49, kurs_r:90,  p:0},
  {d:"2026-03-08",spend:9432, leads:782, su:24, rev:10559, sales:54, kurs_r:0,   p:0},
  {d:"2026-03-01",spend:21098,leads:1863,su:25, rev:15281, sales:89, kurs_r:0,   p:0},
  {d:"2026-02-22",spend:12978,leads:1400,su:32, rev:17089, sales:85, kurs_r:630, p:0},
  {d:"2026-02-15",spend:8878, leads:964, su:33, rev:23563, sales:112,kurs_r:450, p:0},
  {d:"2026-02-08",spend:5390, leads:720, su:25, rev:11106, sales:62, kurs_r:90,  p:0},
  {d:"2026-02-01",spend:8325, leads:1041,su:14, rev:12330, sales:75, kurs_r:90,  p:0},
  {d:"2026-01-25",spend:6819, leads:792, su:36, rev:10183, sales:81, kurs_r:360, p:0},
  {d:"2026-01-18",spend:3384, leads:389, su:28, rev:10587, sales:47, kurs_r:180, p:0},
];
const DAYS=["So","Mo","Di","Mi","Do","Fr","Sa"];
const fmt=d=>d.slice(8,10)+"."+d.slice(5,7)+".";

// Manual data (from WG Analytics — fill in)
const MAN={};
WEB.forEach(w=>MAN[w.d]={cpm:0,stick:0,replay:0,rep_su:0,rep_sales:0,
  v297:0,v344:0,vrate:0,fu297:0,fu344:0,furate:0});

// ══ STATE ═════════════════════════════════════════════════════════════════
let view="last4";
let activeMetric="rev";
const METRICS=[
  {k:"rev",   label:"Revenue",    color:"#0ea5e9", fmt:v=>"€"+Math.round(v).toLocaleString("de-DE")},
  {k:"spend", label:"Ad Spend",   color:"#f59e0b", fmt:v=>"€"+Math.round(v).toLocaleString("de-DE")},
  {k:"roas",  label:"ROAS",       color:"#10b981", fmt:v=>v.toFixed(2)+"x"},
  {k:"leads", label:"Leads",      color:"#8b5cf6", fmt:v=>Math.round(v).toString()},
  {k:"su",    label:"Show-Up %",  color:"#ec4899", fmt:v=>v.toFixed(1)+"%"},
  {k:"cpl",   label:"CPL",        color:"#f97316", fmt:v=>"€"+v.toFixed(2)},
];

function ws(){return view==="last4"?WEB.slice(0,4):WEB}
function wsr(){return [...ws()].reverse()} // chronological for chart

// ══ CALC ══════════════════════════════════════════════════════════════════
function calc(w){
  const m=MAN[w.d]||{};
  const att    = w.leads>0&&w.su>0?Math.round(w.leads*w.su/100):0;
  const stickN = m.stick>0?Math.round(att*m.stick/100):0;
  const liveSl = (m.v297||0)+(m.v344||0)+(m.vrate||0);
  const fuSl   = (m.fu297||0)+(m.fu344||0)+(m.furate||0);
  const repSl  = m.rep_sales||0;
  const totSl  = liveSl+fuSl+repSl||w.sales;
  const cvr    = att>0?totSl/att*100:0;
  const cpl    = w.leads>0?w.spend/w.leads:0;
  const cac    = totSl>0?w.spend/totSl:0;
  const cashR  = w.spend>0?w.rev/w.spend:0;
  const rateCV = Math.round((w.kurs_r||0)/90)*360;
  const cv     = w.rev-(w.kurs_r||0)+rateCV;
  const cvRoas = w.spend>0?cv/w.spend:0;
  const roas   = cashR;
  return {att,stickN,liveSl,fuSl,repSl,totSl,cvr,cpl,cac,cashR,cv,cvRoas,roas,
    cashGain:w.rev-w.spend, cvGain:cv-w.spend};
}

// ══ CHART ═════════════════════════════════════════════════════════════════
function getMetricVal(w, mk){
  const c=calc(w);
  if(mk==="rev")   return w.rev;
  if(mk==="spend") return w.spend;
  if(mk==="roas")  return c.roas;
  if(mk==="leads") return w.leads;
  if(mk==="su")    return w.su;
  if(mk==="cpl")   return c.cpl;
  return 0;
}

function renderMetricPills(){
  document.getElementById("metric-pills").innerHTML=METRICS.map(m=>
    `<button class="metric-pill${activeMetric===m.k?" on":""}" 
      style="background:${activeMetric===m.k?m.color+"22":"#f3f4f6"};color:${m.color};border:1.5px solid ${activeMetric===m.k?m.color:"transparent"}"
      onclick="setMetric('${m.k}')">${m.label}</button>`
  ).join("");
}

function renderTrendStats(){
  const w=ws();
  const M=METRICS.find(m=>m.k===activeMetric);
  const vals=w.map(x=>getMetricVal(x,activeMetric));
  const total=["rev","spend","leads"].includes(activeMetric)?vals.reduce((a,b)=>a+b,0):vals.reduce((a,b)=>a+b,0)/vals.filter(v=>v>0).length;
  const best=Math.max(...vals);
  const worst=Math.min(...vals.filter(v=>v>0));
  const latest=vals[0];
  const prev=vals[1]||0;
  const trend=prev>0?(latest-prev)/prev*100:0;

  document.getElementById("trends-stats").innerHTML=[
    {l:["rev","spend","leads"].includes(activeMetric)?"Gesamt (Zeitraum)":"Durchschnitt",v:M.fmt(total),s:""},
    {l:"Aktuell ("+fmt(w[0].d)+")",v:M.fmt(latest),s:trend!==0?`${trend>0?"+":""}${trend.toFixed(1)}% vs. Vorwoche`:""},
    {l:"Bestes Webinar",v:M.fmt(best),s:fmt(w[vals.indexOf(best)].d)},
    {l:"Schlechtestes",v:M.fmt(worst),s:fmt(w[vals.indexOf(worst)].d)},
  ].map(c=>`<div class="ts-card">
    <div class="ts-label">${c.l}</div>
    <div class="ts-value">${c.v}</div>
    ${c.s?`<div class="ts-sub">${c.s}</div>`:""}
  </div>`).join("");
}

function renderChart(){
  const data=wsr(); // oldest → newest
  const M=METRICS.find(m=>m.k===activeMetric);
  const vals=data.map(x=>getMetricVal(x,activeMetric));
  const maxV=Math.max(...vals)*1.1||1;
  const n=data.length;
  const W=1000,H=200,PAD=10;
  const xStep=(W-PAD*2)/(n-1||1);

  // Build SVG path
  const pts=vals.map((v,i)=>{
    const x=PAD+i*xStep;
    const y=H-PAD-(v/maxV)*(H-PAD*2);
    return {x,y,v,d:data[i]};
  });

  const linePath="M "+pts.map(p=>`${p.x},${p.y}`).join(" L ");
  const areaPath=linePath+` L ${pts[pts.length-1].x},${H} L ${pts[0].x},${H} Z`;

  const gradId="grad_"+activeMetric;
  const c=M.color;

  let svg=`<defs>
    <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${c}" stop-opacity=".25"/>
      <stop offset="100%" stop-color="${c}" stop-opacity=".02"/>
    </linearGradient>
  </defs>`;

  // Grid lines
  for(let i=0;i<=4;i++){
    const y=PAD+(i/4)*(H-PAD*2);
    svg+=`<line x1="${PAD}" y1="${y}" x2="${W-PAD}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
  }

  svg+=`<path d="${areaPath}" fill="url(#${gradId})"/>`;
  svg+=`<path d="${linePath}" fill="none" stroke="${c}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;

  // Dots
  pts.forEach(p=>{
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="4" fill="#fff" stroke="${c}" stroke-width="2"/>`;
  });

  document.getElementById("chart-svg").innerHTML=svg;

  // X Labels
  const labels=document.getElementById("chart-xlabels");
  labels.innerHTML="";
  data.forEach((_,i)=>{
    const el=document.createElement("div");
    el.style.cssText=`flex:1;text-align:center;font-size:11px;color:#9ca3af;font-family:Inter,sans-serif`;
    el.textContent=fmt(data[i].d);
    labels.appendChild(el);
  });
}

function setMetric(k){activeMetric=k;renderMetricPills();renderTrendStats();renderChart();}

// ══ TABLE ═════════════════════════════════════════════════════════════════
function renderTable(){
  // Group headers
  const GR=[
    {cls:"g0",label:"",cs:1},
    {cls:"g0",label:"",cs:1},
    {cls:"g1",label:"📣 Anzeigen",cs:4},
    {cls:"g2",label:"🎙 Live Webinar",cs:4},
    {cls:"g3",label:"💳 Verkäufe Live",cs:5},
    {cls:"g4",label:"▶️ Replay",cs:3},
    {cls:"g5",label:"📧 Follow-Up Sales",cs:3},
    {cls:"g6",label:"📊 Gesamt",cs:5},
    {cls:"g7",label:"💰 Finanzen",cs:6},
  ];
  document.getElementById("gr").innerHTML=GR.map(g=>
    `<th class="${g.cls}" colspan="${g.cs}">${g.label}</th>`
  ).join("");

  // Column headers
  const COLS=["Tag","Datum",
    "Kosten","CPM","Leads","CPL",
    "Ind.\nTeiln.","Show-Up\nRate","Stick\nRate","Pitch\nBeginn",
    "Verkauf\n297€","Verkauf\n344€","Rate\n90€","CVR\nKauf","Sales\nLive",
    "Replay\nTeiln.","Show-Up\nReplay","Replay\nSales",
    "FU Sale\n297€","FU Sale\n344€","FU Rate\n90€",
    "Total\nSales","Ind.\nTeiln.","Teiln/\nSales%","CAC","CPA\nalltime",
    "Cash\nCollect","Cash\nROAS","Cash\nGewinn","Contract\nValue","CV\nGewinn","CV\nROAS"
  ];
  document.getElementById("cr").innerHTML=COLS.map(c=>`<th>${c}</th>`).join("");

  const w=ws();
  let tot={spend:0,leads:0,sales:0,rev:0,cv:0};
  let html="";

  w.forEach(x=>{
    const m=MAN[x.d]||{};
    const c=calc(x);
    const dow=DAYS[new Date(x.d).getDay()];

    const rateCV=Math.round((x.kurs_r||0)/90)*360;
    const cv=x.rev-(x.kurs_r||0)+rateCV;

    // totals
    tot.spend+=x.spend; tot.leads+=x.leads;
    tot.sales+=c.totSl; tot.rev+=x.rev; tot.cv+=cv;

    // helpers
    const E=v=>v>0?"€"+Math.round(v).toLocaleString("de-DE"):"—";
    const P=v=>v>0?v.toFixed(1)+"%":"—";
    const N=v=>v>0?v:"—";
    const plus='<span class="editable">+</span>';

    html+=`<tr>
      <td>${dow}</td>
      <td>${fmt(x.d)}${x.p?' <span style="font-size:10px;color:#9ca3af">●</span>':''}</td>
      <td class="${x.spend>0?"vbold":""}">${E(x.spend)}</td>
      <td class="editable">${m.cpm>0?E(m.cpm):plus}</td>
      <td class="${x.leads>0?"vbold":""}">${N(x.leads)}</td>
      <td class="${c.cpl<=10?"vg":c.cpl<=13?"vy":c.cpl>0?"vr":"vgr"}">${c.cpl>0?"€"+c.cpl.toFixed(2):"—"}</td>
      <td class="vbold">${N(c.att)}</td>
      <td class="${x.su>=28?"vg":x.su>=22?"vy":x.su>0?"vr":"vgr"}">${x.su>0?x.su+"%":"—"}</td>
      <td class="editable">${m.stick>0?m.stick+"%":plus}</td>
      <td class="editable">${m.stick>0?c.stickN:plus}</td>
      <td class="editable">${m.v297>0?m.v297:plus}</td>
      <td class="editable">${m.v344>0?m.v344:plus}</td>
      <td class="editable">${m.vrate>0?m.vrate:plus}</td>
      <td class="${c.cvr>=15?"vg":c.cvr>=8?"vy":c.cvr>0?"vr":"vgr"}">${c.cvr>0?c.cvr.toFixed(1)+"%":"—"}</td>
      <td class="vbold">${c.liveSl>0?c.liveSl:x.sales>0?'<span class="vgr">'+x.sales+'</span>':"—"}</td>
      <td class="editable">${m.replay>0?m.replay:plus}</td>
      <td class="editable">${m.rep_su>0?m.rep_su+"%":plus}</td>
      <td class="editable">${m.rep_sales>0?m.rep_sales:plus}</td>
      <td class="editable">${m.fu297>0?m.fu297:plus}</td>
      <td class="editable">${m.fu344>0?m.fu344:plus}</td>
      <td class="editable">${m.furate>0?m.furate:plus}</td>
      <td class="vbold" style="font-size:15px">${c.totSl}</td>
      <td>${N(c.att)}</td>
      <td class="${c.cvr>=15?"vg":c.cvr>=8?"vy":"vr"}">${c.cvr>0?c.cvr.toFixed(1)+"%":"—"}</td>
      <td class="${c.cac<=175?"vg":c.cac<=260?"vy":"vr"}">${c.cac>0?"€"+Math.round(c.cac):"—"}</td>
      <td class="${c.cac<=175?"vg":c.cac<=260?"vy":"vr"}">${c.cac>0?"€"+Math.round(c.cac):"—"}</td>
      <td class="vbold">${E(x.rev)}</td>
      <td class="${c.cashR>=1.5?"vg":c.cashR>=1?"vy":c.cashR>0?"vr":"vgr"}">${c.cashR>0?c.cashR.toFixed(2)+"x":"—"}</td>
      <td class="${c.cashGain>0?"vg":"vr"}">${c.cashGain!==0?"€"+Math.round(c.cashGain).toLocaleString("de-DE"):"—"}</td>
      <td class="vbold">${E(cv)}</td>
      <td class="${c.cvGain>0?"vg":"vr"}">${c.cvGain!==0?"€"+Math.round(c.cvGain).toLocaleString("de-DE"):"—"}</td>
      <td class="${c.cvRoas>=1.5?"vg":c.cvRoas>=1?"vy":c.cvRoas>0?"vr":"vgr"}">${c.cvRoas>0?c.cvRoas.toFixed(2)+"x":"—"}</td>
    </tr>`;
  });

  // Totals row
  const avgRoas=tot.spend>0?tot.rev/tot.spend:0;
  const avgCV  =tot.spend>0?tot.cv/tot.spend:0;
  html+=`<tr class="totals">
    <td>—</td><td><strong>Gesamt</strong></td>

    <td><strong>${tot.sales}</strong></td>

    <td><strong>€${Math.round(tot.rev).toLocaleString("de-DE")}</strong></td>
    <td class="${avgRoas>=1.5?"vg":avgRoas>=1?"vy":"vr"}">${avgRoas.toFixed(2)}x</td>
    <td class="${tot.rev-tot.spend>0?"vg":"vr"}">€${Math.round(tot.rev-tot.spend).toLocaleString("de-DE")}</td>

    <td class="${tot.cv-tot.spend>0?"vg":"vr"}">€${Math.round(tot.cv-tot.spend).toLocaleString("de-DE")}</td>

  document.getElementById("tbody").innerHTML=html;
}
