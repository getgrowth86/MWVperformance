<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Meilenweit Voraus</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:#f4f5f7;color:#111;min-height:100vh}

.header{background:#fff;border-bottom:1px solid #e5e7eb;padding:0 32px}
.header-inner{max-width:900px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:15px;font-weight:700}
.next-webinar{font-size:12px;color:#6b7280;display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.wrap{max-width:900px;margin:0 auto;padding:28px 32px 80px}

/* Next Webinar Banner */
.next-banner{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.next-left{display:flex;align-items:center;gap:16px}
.next-icon{font-size:28px}
.next-label{font-size:12px;color:#9ca3af;font-weight:500;margin-bottom:3px}
.next-date{font-size:16px;font-weight:700}
.next-stats{display:flex;gap:24px}
.ns-item{text-align:right}
.ns-label{font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px}
.ns-value{font-size:22px;font-weight:700}
.ns-sub{font-size:11px;color:#9ca3af}

/* Section title */
.section-title{font-size:11px;font-weight:600;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:28px}

/* Webinar Cards */
.webinar-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px 24px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.webinar-card:hover{border-color:#d1d5db;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.webinar-card.expanded{border-color:#e5e7eb;box-shadow:0 2px 12px rgba(0,0,0,.08)}

.card-top{display:flex;align-items:center;justify-content:space-between}
.card-left{display:flex;align-items:center;gap:16px}
.card-date{font-size:13px;font-weight:600;color:#111;min-width:52px}
.card-dow{font-size:11px;color:#9ca3af;font-weight:500}

.card-metrics{display:flex;gap:28px;align-items:center}
.cm{text-align:right}
.cm-label{font-size:10px;color:#9ca3af;font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.cm-value{font-size:18px;font-weight:700;letter-spacing:-.3px}

.card-roas{text-align:right}
.roas-badge{display:inline-block;border-radius:6px;padding:4px 12px;font-size:13px;font-weight:700}
.bg{background:#ecfdf5;color:#059669}.by{background:#fffbeb;color:#d97706}.br{background:#fef2f2;color:#dc2626}

/* Expanded detail */
.card-detail{margin-top:16px;padding-top:16px;border-top:1px solid #f3f4f6;display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.cd-item{}
.cd-label{font-size:10px;color:#9ca3af;font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px}
.cd-value{font-size:15px;font-weight:700;color:#111}
.cd-sub{font-size:11px;color:#9ca3af;margin-top:2px}

/* Cumulative */
.cumul-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:24px;margin-bottom:10px}
.cumul-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:#f3f4f6;border-radius:8px;overflow:hidden;margin-top:16px}
.cg-item{background:#fff;padding:16px 14px}
.cg-label{font-size:10px;color:#9ca3af;font-weight:500;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.cg-value{font-size:20px;font-weight:700;letter-spacing:-.3px}
.cg-sub{font-size:11px;color:#9ca3af;margin-top:3px}

/* Chart */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:32px;margin-top:8px}
.mc-bar{border-radius:2px 2px 0 0;flex:1;opacity:.7}

/* Colors */
.green{color:#059669}.yellow{color:#d97706}.red{color:#dc2626}.gray{color:#9ca3af}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo">Meilenweit Voraus</div>
    <div class="next-webinar">
      <div class="dot"></div>
      <span id="next-label">Nächstes Webinar: Sonntag 10. Mai · 10:00 Uhr</span>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- Next Webinar Banner -->
  <div class="next-banner">
    <div class="next-left">
      <div class="next-icon">📅</div>
      <div>
        <div class="next-label">Nächstes Webinar</div>
        <div class="next-date">Sonntag, 10. Mai 2026 · 10:00 Uhr</div>
      </div>
    </div>
    <div class="next-stats">
      <div class="ns-item">
        <div class="ns-label">Anmeldungen</div>
        <div class="ns-value" id="wg-count">
          <span style="font-size:14px;color:#9ca3af">laden…</span>
        </div>
        <div class="ns-sub" id="wg-sub"></div>
      </div>
      <div class="ns-item">
        <div class="ns-label">Ad Spend MTD</div>
        <div class="ns-value green">€3.078</div>
        <div class="ns-sub">seit 01. Mai</div>
      </div>
      <div class="ns-item">
        <div class="ns-label">Est. Show-Up</div>
        <div class="ns-value" id="est-su">—</div>
        <div class="ns-sub">bei 20% Rate</div>
      </div>
    </div>
  </div>

  <!-- Last 4 Webinars -->
  <div class="section-title">Letzte Webinare</div>
  <div id="webinar-list"></div>

  <!-- Current Month Cumulative -->
  <div class="section-title">Mai 2026 — Kumuliert</div>
  <div class="cumul-card" id="cumul-card"></div>

</div>

<script>
// ══ DATA ══════════════════════════════════════════
const WEBINARS = [
  {d:"2026-05-03",dow:"So",spend:3078, leads:551, su:17, rev:1282,  sales:7,  cac:440,  partial:true},
  {d:"2026-04-26",dow:"So",spend:0,    leads:0,   su:0,  rev:11351, sales:45, cac:0,    partial:false},
  {d:"2026-04-19",dow:"So",spend:7243, leads:598, su:20, rev:16320, sales:50, cac:145,  partial:false},
  {d:"2026-04-12",dow:"So",spend:9932, leads:1259,su:21, rev:3649,  sales:24, cac:414,  partial:false},
];

const MAY_ALL = [
  {d:"2026-05-03",spend:3078,leads:551,su:17,rev:1282,sales:7},
  // 10.05. folgt Sonntag
];

// ══ HELPERS ══════════════════════════════════════
const eur  = n => "€" + Math.round(n).toLocaleString("de-DE");
const f2   = n => n.toFixed(2) + "x";
const rc   = r => r >= 1.5 ? "bg" : r >= 1.0 ? "by" : "br";
const rcc  = r => r >= 1.5 ? "green" : r >= 1.0 ? "yellow" : "red";
const suC  = s => s >= 28 ? "green" : s >= 22 ? "yellow" : "red";
const cplC = c => !c ? "gray" : c <= 10 ? "green" : c <= 13 ? "yellow" : "red";
const fmt  = d => d.slice(8,10) + "." + d.slice(5,7) + ".";

let expanded = null;

// ══ WEBINAR CARDS ══════════════════════════════════
function renderWebinars() {
  let html = "";
  WEBINARS.forEach(w => {
    const roas    = w.spend > 0 ? w.rev / w.spend : 0;
    const cpl     = w.leads > 0 ? w.spend / w.leads : 0;
    const att     = w.leads > 0 && w.su > 0 ? Math.round(w.leads * w.su / 100) : 0;
    const isExp   = expanded === w.d;

    html += `
    <div class="webinar-card${isExp?" expanded":""}" onclick="toggle('${w.d}')">
      <div class="card-top">
        <div class="card-left">
          <div>
            <div class="card-date">${fmt(w.d)}</div>
            <div class="card-dow">${w.dow}${w.partial?' · laufend':''}</div>
          </div>
        </div>
        <div class="card-metrics">
          <div class="cm">
            <div class="cm-label">Revenue</div>
            <div class="cm-value ${rcc(roas)}">${eur(w.rev)}</div>
          </div>
          <div class="cm">
            <div class="cm-label">Sales</div>
            <div class="cm-value">${w.sales}</div>
          </div>
          <div class="cm">
            <div class="cm-label">Leads</div>
            <div class="cm-value">${w.leads > 0 ? w.leads : "—"}</div>
          </div>
          <div class="cm">
            <div class="cm-label">Show-Up</div>
            <div class="cm-value ${suC(w.su)}">${w.su > 0 ? w.su + "%" : "—"}</div>
          </div>
          <div class="card-roas">
            ${w.roas > 0 || w.spend > 0
              ? `<span class="roas-badge ${rc(roas)}">${roas > 0 ? f2(roas) : "—"}</span>`
              : `<span style="font-size:12px;color:#9ca3af">carry-over</span>`}
          </div>
        </div>
      </div>

      ${isExp ? `
      <div class="card-detail">
        <div class="cd-item">
          <div class="cd-label">Ad Spend</div>
          <div class="cd-value">${w.spend > 0 ? eur(w.spend) : "—"}</div>
        </div>
        <div class="cd-item">
          <div class="cd-label">CPL</div>
          <div class="cd-value ${cplC(cpl)}">${cpl > 0 ? "€" + cpl.toFixed(2) : "—"}</div>
        </div>
        <div class="cd-item">
          <div class="cd-label">Teilnehmer</div>
          <div class="cd-value">${att > 0 ? att : "—"}</div>
          <div class="cd-sub">${att > 0 ? "von " + w.leads + " Leads" : ""}</div>
        </div>
        <div class="cd-item">
          <div class="cd-label">Ø Order</div>
          <div class="cd-value">${w.sales > 0 ? eur(Math.round(w.rev / w.sales)) : "—"}</div>
        </div>
        <div class="cd-item">
          <div class="cd-label">CAC</div>
          <div class="cd-value ${w.cac > 0 ? (w.cac <= 175 ? "green" : w.cac <= 260 ? "yellow" : "red") : "gray"}">${w.cac > 0 ? eur(w.cac) : "—"}</div>
        </div>
      </div>` : ""}
    </div>`;
  });
  document.getElementById("webinar-list").innerHTML = html;
}

// ══ CUMULATIVE MAY ══════════════════════════════════
function renderCumul() {
  const totRev   = MAY_ALL.reduce((a, w) => a + w.rev, 0);
  const totSpend = MAY_ALL.reduce((a, w) => a + w.spend, 0);
  const totSales = MAY_ALL.reduce((a, w) => a + w.sales, 0);
  const totLeads = MAY_ALL.reduce((a, w) => a + w.leads, 0);
  const roas     = totSpend > 0 ? totRev / totSpend : 0;
  const cpl      = totLeads > 0 ? totSpend / totLeads : 0;

  document.getElementById("cumul-card").innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="font-size:14px;font-weight:600">Mai 2026</div>
      <div style="font-size:11px;color:#9ca3af">1 Webinar abgeschlossen · 1 diese Woche</div>
    </div>
    <div class="cumul-grid">
      <div class="cg-item">
        <div class="cg-label">Revenue</div>
        <div class="cg-value ${rcc(roas)}">${eur(totRev)}</div>
        <div class="cg-sub">TC Charges</div>
      </div>
      <div class="cg-item">
        <div class="cg-label">Ad Spend</div>
        <div class="cg-value">${eur(totSpend)}</div>
        <div class="cg-sub">${MAY_ALL.length} Webinar(e)</div>
      </div>
      <div class="cg-item">
        <div class="cg-label">ROAS</div>
        <div class="cg-value ${rcc(roas)}">${roas > 0 ? f2(roas) : "—"}</div>
        <div class="cg-sub">Ziel: 2.0x</div>
      </div>
      <div class="cg-item">
        <div class="cg-label">Sales</div>
        <div class="cg-value">${totSales}</div>
        <div class="cg-sub">Neue Käufer</div>
      </div>
      <div class="cg-item">
        <div class="cg-label">CPL</div>
        <div class="cg-value ${cplC(cpl)}">${cpl > 0 ? "€" + cpl.toFixed(2) : "—"}</div>
        <div class="cg-sub">Ziel: ≤€12</div>
      </div>
    </div>`;
}

// ══ WEBINARGEEK LIVE COUNT ══════════════════════════
async function loadWGCount() {
  try {
    const res  = await fetch("/api/webinargeek?path=/webinars");
    const data = await res.json();
    const webinars = data.webinars || [];

    // Finde Webinar 10. Mai 2026
    const next = webinars.find(w => {
      const bd = w.broadcasts || [];
      return bd.some(b => b.start_time && b.start_time.includes("2026-05-10"));
    }) || webinars.find(w => w.title && w.title.toLowerCase().includes("workshop"));

    if (!next) {
      document.getElementById("wg-count").textContent = "—";
      return;
    }

    // Subscriptions laden
    const wid = next.id;
    const bcast = (next.broadcasts || []).find(b => b.start_time && b.start_time.includes("2026-05-10"));
    const bid = bcast ? bcast.id : null;

    let subRes;
    if (bid) {
      subRes = await fetch(`/api/webinargeek?path=/webinars/${wid}/broadcasts/${bid}/subscriptions&per_page=1`);
    } else {
      subRes = await fetch(`/api/webinargeek?path=/webinars/${wid}/subscriptions&per_page=1`);
    }

    const subData = await subRes.json();
    const total = subData.total_entries || subData.total || (subData.subscriptions || []).length;

    document.getElementById("wg-count").innerHTML = `<span class="green">${total.toLocaleString("de-DE")}</span>`;
    document.getElementById("wg-sub").textContent = "Registrierungen";

    // Est Show-Up
    const estSU = Math.round(total * 0.20);
    document.getElementById("est-su").innerHTML = `<span class="${estSU >= 80 ? "green" : "yellow"}">${estSU}</span>`;

  } catch(e) {
    document.getElementById("wg-count").innerHTML = `<span style="font-size:12px;color:#9ca3af">Fehler</span>`;
    console.error(e);
  }
}

// ══ TOGGLE ══════════════════════════════════════════
function toggle(d) {
  expanded = expanded === d ? null : d;
  renderWebinars();
}

// ══ INIT ═════════════════════════════════════════════
renderWebinars();
renderCumul();
loadWGCount();
</script>
</body>
</html>
