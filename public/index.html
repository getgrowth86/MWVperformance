  {name:"ML 30.03. Testing ABO DACH",          spend:6919,leads:674,cpl:10.27,freq:1.53,ctr:4.72,budget:230},

// ═══════════ HELPERS ═════════════════════════════════════════════════════════

const eur  = n => "€" + Math.round(n||0).toLocaleString("de-DE");
const f2   = n => (n||0).toFixed(2);
const pct  = (a,b) => b > 0 ? Math.round(a/b*100) : 0;

const roasColor  = r => r >= 1.5 ? "#22c55e" : r >= 1.0 ? "#f59e0b" : "#ef4444";
const roasBadge  = r => r >= 1.5 ? "#f0fdf4" : r >= 1.0 ? "#fefce8" : "#fef2f2";
const cplColor   = c => !c ? "#666" : c <= 10 ? "#22c55e" : c <= 13 ? "#f59e0b" : "#ef4444";
const suColor    = s => s >= 28 ? "#22c55e" : s >= 22 ? "#f59e0b" : "#ef4444";

const AI_SYS = `Meta Ads Analyst für "Meilenweit Voraus" (Kurs €297, Webinar sonntags, 40% Käufe Tag 7).
CPL Ziel ≤€12, Freq <3.0, CTR gut >5%. Meta sieht nur ~3% Käufe. Antworte NUR als JSON:
{"signal":"high"|"medium"|"low","signal_reason":"max 7W","trust":"high"|"medium"|"low","trust_reason":"max 7W","audience":"deep"|"medium"|"saturating","audience_reason":"max 7W","verdict":"scale"|"hold"|"test"|"pause","verdict_label":"max 4W","action":"max 10W","budget_recommended":number}`;

async function runAI(c) {
  const res = await fetch(window.location.origin+"/api/claude", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:AI_SYS,
      messages:[{role:"user",content:`${c.name}\nSpend:€${c.spend} Leads:${c.leads} CPL:€${f2(c.cpl)} CTR:${c.ctr}% Freq:${c.freq} Budget:€${c.budget}/T`}]})
  });
  const d = await res.json();
  return JSON.parse((d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
}

// ═══════════ COMPONENTS ══════════════════════════════════════════════════════

function Spin() {
  return <div style={{width:13,height:13,border:"2px solid #e5e7eb",borderTopColor:"#6366f1",borderRadius:"50%",animation:"spin .7s linear infinite",flexShrink:0}}/>;
}

function Badge({label, color="#22c55e", bg="#052e16"}) {
  return (
    <span style={{background:bg,color,borderRadius:4,padding:"2px 8px",fontSize:11,fontWeight:600,letterSpacing:0.3,display:"inline-block",border:`1px solid ${color}33`}}>
      {label}
    </span>
  );
}

// ═══════════ MAIN APP ════════════════════════════════════════════════════════

export default function App() {
  const [view, setView] = useState("last4"); // last4 | all
  const [expanded, setExpanded] = useState(null);
  const [aiResults, setAiResults] = useState({});
  const [aiLoading, setAiLoading] = useState({});
  const [aiRunning, setAiRunning] = useState(false);
  const [metaExpanded, setMetaExpanded] = useState(null);

  const webinars = useMemo(() =>
    view === "last4" ? WEBINARS.slice(0, 4) : WEBINARS
  , [view]);

  // Aggregates
  const totRev   = webinars.reduce((a,w)=>a+w.revenue,0);
  const totSpend = webinars.reduce((a,w)=>a+w.spend,0);
  const totSales = webinars.reduce((a,w)=>a+w.sales,0);
  const avgRoas  = totSpend > 0 ? totRev/totSpend : 0;
  const avgSU    = webinars.filter(w=>w.showUp>0).reduce((a,w,_,arr)=>a+w.showUp/arr.length,0);
  const allD0    = webinars.reduce((a,w)=>a+w.day0,0);
  const allD7    = webinars.reduce((a,w)=>a+w.day7,0);
  const metaSpend= META.reduce((a,c)=>a+c.spend,0);
  const metaLeads= META.reduce((a,c)=>a+c.leads,0);

  // AI
  async function analyzeOne(c) {
    setAiLoading(l=>({...l,[c.name]:true}));
    try { const r=await runAI(c); setAiResults(p=>({...p,[c.name]:r})); } catch{}
    setAiLoading(l=>({...l,[c.name]:false}));
  }
  async function analyzeAll() {
    setAiRunning(true);
    for(const c of META){ await analyzeOne(c); await new Promise(r=>setTimeout(r,250)); }
    setAiRunning(false);
  }

  const VERDICT = {
    scale:{label:"SCALE",    color:"#22c55e", bg:"#052e16"},
    hold: {label:"HOLD",     color:"#f59e0b", bg:"#1c1400"},
    test: {label:"TEST",     color:"#818cf8", bg:"#1e1b4b"},
    pause:{label:"PAUSE",    color:"#ef4444", bg:"#1c0505"},
  };

  const S = {
    // Layout
    page:   {minHeight:"100vh",background:"#f5f6fa",padding:"0 0 60px"},
    wrap:   {maxWidth:1400,margin:"0 auto",padding:"0 32px"},

    // Header
    header: {background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"0 32px",position:"sticky",top:0,zIndex:100},
    headerInner:{maxWidth:1400,margin:"0 auto",height:56,display:"flex",alignItems:"center",justifyContent:"space-between"},

    // KPI cards
    kpiGrid:{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:1,background:"#e5e7eb",border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",marginBottom:24},
    kpiCard:{background:"#fff",padding:"20px 24px"},
    kpiLabel:{fontSize:11,color:"#9ca3af",fontWeight:500,textTransform:"uppercase",letterSpacing:1,marginBottom:8},
    kpiValue:{fontSize:26,fontWeight:700,letterSpacing:-0.5,lineHeight:1},
    kpiSub:  {fontSize:11,color:"#9ca3af",marginTop:4},

    // Section
    section:{marginBottom:24},
    sectionHead:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12},
    sectionTitle:{fontSize:13,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:1},

    // Table
    table:  {background:"#fff",border:"1px solid #e5e7eb",borderRadius:12,overflow:"hidden"},
    thead:  {display:"grid",padding:"12px 20px",background:"#f9fafb",borderBottom:"1px solid #e5e7eb"},
    th:     {fontSize:11,color:"#9ca3af",fontWeight:500,textTransform:"uppercase",letterSpacing:0.8},
    trow:   {display:"grid",padding:"16px 20px",borderBottom:"1px solid #f3f4f6",cursor:"pointer",transition:"background 0.1s"},
    td:     {fontSize:14,color:"#6b7280"},
    tdBig:  {fontSize:18,fontWeight:700,color:"#111",letterSpacing:-0.3},

    // Buttons
    btn:    {border:"none",borderRadius:6,padding:"7px 16px",fontSize:12,fontWeight:600,cursor:"pointer",transition:"all 0.1s"},
    btnPrim:{background:"#111",color:"#fff"},
    btnAct: {background:"#fff",color:"#000"},
    btnSm:  {border:"none",borderRadius:4,padding:"4px 10px",fontSize:11,fontWeight:600,cursor:"pointer",background:"#f3f4f6",color:"#6b7280"},
  };

  // Webinar columns
  const WCols = "120px 1fr 80px 70px 80px 70px 80px 120px 90px";
  // Meta columns
  const MCols = "2fr 90px 70px 80px 65px 65px 100px";

  return (
    <div style={S.page}>

                  ...S.btn,

            </div>
          </div>
        </div>
      </div>

      <div style={S.wrap}>
        <div style={{height:28}}/>

        {/* ── KPI STRIP ── */}
        <div style={S.kpiGrid}>
          {[
            {label:"Revenue",      value:eur(totRev),      sub:`${totSales} Käufe`, color:roasColor(avgRoas)},
            {label:"Ad Spend",     value:eur(totSpend),    sub:`${webinars.length} Webinare`, color:"#fff"},
            {label:"Ø ROAS",       value:f2(avgRoas)+"x",  sub:"TC Revenue ÷ Spend", color:roasColor(avgRoas)},
            {label:"Show-Up Ø",    value:Math.round(avgSU)+"%", sub:"aller Webinare", color:suColor(avgSU)},
            {label:"Tag 0",        value:pct(allD0,totSales)+"%", sub:"kaufen am Webinar-Tag", color:"#818cf8"},
            {label:"Tag 7",        value:pct(allD7,totSales)+"%", sub:"vor nächstem Webinar", color:"#f59e0b"},
          ].map(({label,value,sub,color})=>(

                      {w.spend===0&&!w.partial&&<div style={{fontSize:10,color:"#f59e0b",marginTop:2}}>carry</div>}

                    {/* Product bars */}
                    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap"}}>
                      {products.map(p=>(
                        <div key={p.k} style={{height:4,borderRadius:2,background:p.color,width:`${Math.max(pct(w[p.k],w.revenue),8)}%`,maxWidth:40,minWidth:8,opacity:0.8}} title={`${p.label}: ${eur(w[p.k])}`}/>
                      ))}
                    </div>

                    <div style={{...S.tdBig,color:"#fff"}}>{eur(w.revenue)}</div>
                    <div style={{...S.tdBig,fontSize:16}}>{w.sales}</div>
                    <div>
                      {w.roas>0
                        ? <Badge label={f2(w.roas)+"x"} color={roasColor(w.roas)} bg={roasBadge(w.roas)}/>
                        : <span style={{color:"#333"}}>—</span>}
                    </div>
                    <div style={{...S.td,color:suColor(w.showUp)}}>{w.showUp>0?w.showUp+"%":"—"}</div>
                    <div style={{...S.td,color:"#818cf8",fontWeight:500}}>{pct(w.day0,w.sales)}%</div>
                    <div style={{...S.td,color:"#f59e0b",fontWeight:500}}>{pct(w.day7,w.sales)}%</div>
                    <div style={{...S.td,color:"#444"}}>{w.spend>0?eur(w.spend):"—"}</div>
                  </div>

                  {/* Expanded product detail */}
                  {isExp&&(
                    <div style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb",padding:"16px 20px",animation:"fadeIn 0.15s ease"}}>

                          {k:"kurs",label:"Meilenkurs",color:"#818cf8"},
                          {k:"masterclass",label:"Masterclass",color:"#f59e0b"},
                          {k:"revolut",label:"Revolut/KB",color:"#22c55e"},
                          {k:"george",label:"George",color:"#38bdf8"},
                        ].map(({k,label,color})=>{
                          const v = w[k]||0;
                          return (
                            <div key={k} style={{background:"#fff",padding:"14px 16px"}}>
                              <div style={{fontSize:11,color:"#9ca3af",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>
                                <div style={{width:6,height:6,borderRadius:"50%",background:v>0?color:"#222"}}/>
                                {label}
                              </div>
                              <div style={{fontSize:18,fontWeight:700,color:v>0?color:"#222"}}>{v>0?eur(v):"—"}</div>
                              {v>0&&<div style={{fontSize:10,color:"#333",marginTop:2}}>{pct(v,w.revenue)}% of revenue</div>}
                            </div>
                          );
                        })}
                        <div style={{background:"#fff",padding:"14px 16px"}}>
                          <div style={{fontSize:11,color:"#444",marginBottom:4}}>CPL</div>
                          <div style={{fontSize:18,fontWeight:700,color:w.leads>0?cplColor(w.spend/w.leads):"#222"}}>
                            {w.leads>0?("€"+f2(w.spend/w.leads)):"—"}
                          </div>
                        </div>
                        <div style={{background:"#fff",padding:"14px 16px"}}>
                          <div style={{fontSize:11,color:"#444",marginBottom:4}}>Ø Order Value</div>
                          <div style={{fontSize:18,fontWeight:700,color:"#fff"}}>
                            {w.sales>0?eur(w.revenue/w.sales):"—"}
                          </div>
                        </div>

                  )}

              );

          <div style={S.sectionHead}>

            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <span style={{fontSize:11,color:"#9ca3af"}}>Windsor.ai · 30T · {eur(metaSpend)} · {metaLeads} Leads</span>
              <button
                onClick={analyzeAll} disabled={aiRunning}
                style={{...S.btn,...S.btnPrim,display:"flex",alignItems:"center",gap:5,opacity:aiRunning?0.5:1}}
              >
                {aiRunning?<><Spin/>Analysiere…</>:<>✦ KI-Analyse</>}
              </button>
            </div>
          </div>

          <div style={S.table}>
            <div style={{...S.thead,gridTemplateColumns:MCols}}>
              {["Kampagne","Spend","Leads","CPL","CTR","Freq","KI"].map(h=>(
                <div key={h} style={S.th}>{h}</div>
              ))}
            </div>

            {META.map((c,i)=>{
              const res = aiResults[c.name];
              const loading = aiLoading[c.name];
              const vc = res ? VERDICT[res.verdict] : null;
              const isExp = metaExpanded===c.name;

              return (
                <div key={c.name}>
                  <div
                    onClick={()=>{ if(!res&&!loading) analyzeOne(c); else setMetaExpanded(isExp?null:c.name); }}
                    style={{
                      ...S.trow, gridTemplateColumns:MCols,
                      background:isExp?"#f9fafb":"transparent",
                      borderBottom:i<META.length-1||isExp?"1px solid #1a1a1a":"none",
                    }}
                    onMouseEnter={e=>e.currentTarget.style.background="#f9fafb"}
                    onMouseLeave={e=>e.currentTarget.style.background=isExp?"#f9fafb":"transparent"}
                  >
                    <div style={{fontSize:13,fontWeight:500,color:"#374151",paddingRight:16,lineHeight:1.4}}>{c.name}</div>
                    <div style={{...S.td}}>{eur(c.spend)}</div>
                    <div style={{...S.td,fontWeight:600,color:"#fff"}}>{c.leads||"—"}</div>
                    <div style={{fontSize:14,fontWeight:600,color:cplColor(c.cpl)}}>{c.cpl>0?"€"+f2(c.cpl):"—"}</div>
                    <div style={{...S.td,color:c.ctr>=5?"#22c55e":"#f59e0b"}}>{c.ctr.toFixed(1)}%</div>
                    <div style={{...S.td,color:c.freq>=2?"#ef4444":c.freq>=1.5?"#f59e0b":"#666"}}>{c.freq.toFixed(2)}</div>
                    <div>
                      {loading&&<div style={{display:"flex",alignItems:"center",gap:6}}><Spin/><span style={{fontSize:11,color:"#444"}}>…</span></div>}
                      {!loading&&!res&&<span style={{fontSize:11,color:"#d1d5db"}}>→ analysieren</span>}
                      {res&&vc&&<Badge label={vc.label} color={vc.color} bg={vc.bg}/>}
                    </div>
                  </div>

                  {res&&isExp&&(
                    <div style={{background:"#f9fafb",borderBottom:"1px solid #e5e7eb",padding:"16px 20px",animation:"fadeIn 0.15s ease"}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1.2fr",gap:16}}>
                        {[["Signal",res.signal,res.signal_reason],["Trust",res.trust,res.trust_reason],["Audience",res.audience,res.audience_reason]].map(([l,level,reason])=>{
                          const col = {high:"#22c55e",medium:"#f59e0b",low:"#ef4444",deep:"#22c55e",saturating:"#ef4444"}[level]||"#666";
                          return (
                            <div key={l}>
                              <div style={{fontSize:11,color:"#444",marginBottom:3}}>{l}: <span style={{color:col,fontWeight:600}}>{level}</span></div>
                              <div style={{fontSize:12,color:"#6b7280",lineHeight:1.4}}>{reason}</div>
                            </div>
                          );
                        })}
                        <div style={{borderLeft:"1px solid #e5e7eb",paddingLeft:16}}>
                          <div style={{fontSize:11,color:"#444",marginBottom:3}}>Aktion</div>
                          <div style={{fontSize:12,color:"#374151",fontWeight:500,lineHeight:1.4}}>{res.action}</div>
                          {res.budget_recommended&&res.budget_recommended!==c.budget&&(
                            <div style={{display:"flex",alignItems:"center",gap:8,marginTop:8}}>
                              <span style={{fontSize:12,color:"#444",textDecoration:"line-through"}}>€{c.budget}/T</span>
                              <span style={{fontSize:14,fontWeight:700,color:res.verdict==="scale"?"#22c55e":"#ef4444"}}>→ €{res.budget_recommended}/T</span>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── FOOTER ── */}
        <div style={{textAlign:"center",fontSize:11,color:"#d1d5db",paddingTop:16}}>
          MEILENWEIT VORAUS · ThriveCart CSV · Meta Windsor.ai · Sonntag 10:00 Attribution · Claude AI
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
